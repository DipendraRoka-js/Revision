  <meta charset="UTF-8">

<body>

<button onClick = "
  playGame('Rock');
  ">
    Rock
</button>

  <button onClick = "
  playGame('Paper');
  ">
    Paper
  </button>

  <button onClick = "
    playGame('Scissors');
  ">
    Scissors
  </button>


  <script>
function playGame(playerChoice){

    const computerChoice = getComputerChoice();
    let result = '';

    if (playerChoice === 'Paper'){
      if(computerChoice === 'Rock'){
        result = 'lose';
      }
      else if(computerChoice === 'Paper'){
        result = 'You Tied';
      }
      else{
        result = 'You Loose';
      }}else if(playerChoice === 'Rock'){
        if(computerChoice === 'Rock'){
          result = 'You Tied';
        }
        else if(computerChoice === 'Paper'){
          result = 'You Loose';
        }
        else{
          result = 'You Win';
        }
      }
      else{
        if(computerChoice === 'Rock'){
          result = 'You Loose';
        }
        else if(computerChoice === 'Paper'){
          result = 'You Win';
        }
        else{
          result = 'You Tied';
        }
      }



    alert(`You chose: ${playerChoice} \n Computer choice: ${computerChoice} \n Result: ${result}`);
}
    function getComputerChoice(){
      const randomNumber = Math.random();

      let ComputerChoice = '';
  
      if(randomNumber < 1/3){
       ComputerChoice = 'Rock';
      }
    
      else if(randomNumber < 2/3){
        ComputerChoice = 'Paper';
      }
      else{
        ComputerChoice = 'Scissors';
      }

      return ComputerChoice;
    }
  </script>
