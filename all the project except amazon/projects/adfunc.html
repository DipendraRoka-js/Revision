<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="../styles/adfunc.css">
</head>
<body>
  <p class="title">Rock Paper Scissors</p>
  <button class="js-rock-button">
    <img src="../images/rock.png" class="choice-img" alt="Rock">
  </button>

  <button class="js-paper-button">
    <img src="../images/paper.jpeg" class="choice-img" alt="Paper">
  </button>

  <button class="js-scissor-button">
    <img src="../images/scissors.png" class="choice-img" alt="Scissors">
  </button>

  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="result"></p>

<button class="js-reset-button">
  Reset
</button>


<button class="auto-play">Auto play</button>
<script src="../script/adfunc.js"></script>
</body>
</html>
