<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  

  <script>
    // =======================================
// ASYNC / AWAIT PRACTICE FILE
// =======================================

console.log("Program Started");

// ---------------------------
// Function 1: Wait Function
// ---------------------------
function wait(ms) {
  return new Promise((resolve) => {
    setTimeout(resolve, ms);
  });
}

// ---------------------------
// Function 2: Fake Login
// ---------------------------
function login(username) {
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve(`Welcome ${username}!`);
    }, 2000);
  });
}

// ---------------------------
// Function 3: Fake Balance
// ---------------------------
function getBalance() {
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve(5000);
    }, 1500);
  });
}

// ---------------------------
// Function 4: Fake Weather
// ---------------------------
function getWeather() {
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve("🌤️ 28°C");
    }, 1000);
  });
}

// ---------------------------
// Main Async Function
// ---------------------------
async function main() {
  console.log("\nLoading application...\n");

  await wait(1000);

  console.log("Checking login...");

  const user = await login("Dipendra");
  console.log(user);

  console.log("\nFetching balance...");

  const balance = await getBalance();
  console.log(`Balance: Rs. ${balance}`);

  console.log("\nChecking weather...");

  const weather = await getWeather();
  console.log(`Today's Weather: ${weather}`);

  console.log("\nEverything loaded successfully!");
}

main();

// ---------------------------
// Fetch API Example
// ---------------------------
async function fetchPost() {
  try {
    console.log("\nFetching data from API...\n");

    const response = await fetch(
      "https://jsonplaceholder.typicode.com/posts/1"
    );

    const post = await response.json();

    console.log("Post Title:");
    console.log(post.title);

    console.log("\nPost Body:");
    console.log(post.body);
  } catch (error) {
    console.log("Error:", error.message);
  }
}

fetchPost();

// ---------------------------
// Countdown Example
// ---------------------------
async function countdown() {
  console.log("\nCountdown:");

  for (let i = 3; i >= 1; i--) {
    console.log(i);
    await wait(1000);
  }

  console.log("🚀 Lift Off!");
}

countdown();

// ---------------------------
// Random Number Generator
// ---------------------------
function randomNumber() {
  return new Promise((resolve) => {
    setTimeout(() => {
      const number = Math.floor(Math.random() * 100) + 1;
      resolve(number);
    }, 1200);
  });
}

async function showRandomNumber() {
  const number = await randomNumber();
  console.log(`\nRandom Number: ${number}`);
}

showRandomNumber();

// ---------------------------
// Calculator
// ---------------------------
async function add(a, b) {
  return a + b;
}

async function calculate() {
  const result = await add(25, 75);
  console.log(`\n25 + 75 = ${result}`);
}

calculate();

// ---------------------------
// End
// ---------------------------
console.log("\nOther code keeps running while async functions wait...");
  </script>
</body>
</html>
