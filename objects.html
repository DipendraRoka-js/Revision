<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <button onClick = "
    playGame('Rock');
    ">
      Rock
  </button>

    <button onClick = "
    playGame('Paper');
    ">
      Paper
    </button>

    <button onClick = "
      playGame('Scissors');
    ">
      Scissors
    </button>

    <button onClick = "
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      alert('Score was reset');
    ">
      Reset
    </button>




  <script>
const score=JSON.parse(localStorage.getItem('score')) || { wins: 0, losses: 0, ties: 0 };

function playGame(playerChoice){

    const computerChoice = getComputerChoice();
    let result = '';

    if (playerChoice === 'Paper'){
      if(computerChoice === 'Rock'){
        result = ' You Win';
      }
      else if(computerChoice === 'Paper'){
        result = 'You Tied';
      }
      else{
        result = 'You Loose';
      }}
      
      else if(playerChoice === 'Rock'){
        if(computerChoice === 'Rock'){
          result = 'You Tied';
        }
        else if(computerChoice === 'Paper'){
          result = 'You Loose';
        }
        else{
          result = 'You Win';
        }
      }
      else{
        if(computerChoice === 'Rock'){
          result = 'You Loose';
        }
        else if(computerChoice === 'Paper'){
          result = 'You Win';
        }
        else{
          result = 'You Tied';
        }
      }

      if (result === 'You Win'){
        score.wins += 1;
      }
      else if(result === 'You Loose'){
        score.losses += 1;
      }
      else{
        score.ties += 1;
      }

      localStorage.setItem('score', JSON.stringify(score));

    alert(`You chose: ${playerChoice} \n Computer choice: ${computerChoice} \n Result: ${result
    
    } \n Wins: ${score.wins} \n Losses: ${score.losses} \n Ties: ${score.ties}`);
}


    function getComputerChoice(){
      const randomNumber = Math.random();

      let ComputerChoice = '';
  
      if(randomNumber < 1/3){
       ComputerChoice = 'Rock';
      }
    
      else if(randomNumber < 2/3){
        ComputerChoice = 'Paper';
      }
      else{
        ComputerChoice = 'Scissors';
      }

      return ComputerChoice;
    }
  </script>


</body>
</html>
