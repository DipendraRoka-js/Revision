<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple dom</title>
</head>
<body>


  <input type="text" class="input" placeholder="Enter your name" onkeydown="greet(event)">
  <p class="output"></p>

  <script>

    function greet(event){
      if(event.key === 'Enter'){
      const input = document.querySelector('.input');
      document.querySelector('.output').innerText = `${input.value}`;
    }}
  </script>
  
</body>
</html>
